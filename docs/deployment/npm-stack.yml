# ==========================================================================
# npm-stack  —  Nginx Proxy Manager
# Pila independiente en Dockge. Se conecta a backup-stack por 'proxy-net'.
# Sube esta pila PRIMERO, antes de backup-stack.
# ==========================================================================

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"           # UI de administración — ciérrala con firewall cuando termines la config
    environment:
      TZ: America/Bogota
      DISABLE_IPV6: "true"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  proxy-net:
    external: true

volumes:
  npm_data:
  npm_letsencrypt:
