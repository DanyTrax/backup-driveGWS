# ==========================================================================
# backup-stack  —  MSA Backup Commander
# Despliegue: pila en Dockge, detrás de Nginx Proxy Manager (pila aparte).
# Red compartida externa: proxy-net  (docker network create proxy-net)
#
# IMPORTANTE: el fichero real de variables suele estar en ../.env (no en esta carpeta).
# Desde docker/: siempre pasá --env-file ../.env en build, up y down.
# Ej.: docker compose --env-file ../.env up -d --force-recreate
# Sin eso, ${POSTGRES_USER}, ${REDIS_PASSWORD}, etc. quedan vacíos y rompen Postgres/Redis/Dovecot.
# ==========================================================================

services:

  # ------------------------------------------------------------------ app
  # FastAPI (Uvicorn) + rclone + gyb
  app:
    image: ghcr.io/danytrax/backup-drivegws-app:${APP_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: msa-backup-app
    restart: unless-stopped
    env_file: ../.env
    environment:
      ROLE: api
    expose:
      - "8000"
    volumes:
      # Montar solo el código Python — NO ../backend:/app entero: eso borra /app/static
      # (el SPA compilado en la imagen) y deja solo 404 en / y sin /assets.
      - ../backend/app:/app/app:rw
      - ../backend/migrations:/app/migrations:rw
      - ../backend/tests:/app/tests:rw
      - ../backend/scripts:/app/scripts:rw
      - ../backend/alembic.ini:/app/alembic.ini:ro
      - app_data:/data                     # DB sqlite temporal si aplica, tokens, keys
      - rclone_config:/root/.config/rclone
      - secrets:/app/secrets:ro
      - maildirs:/var/mail/vhosts          # backups gmail convertidos a Maildir
      - platform_backups:/platform_backups
      # Export GYB (.eml): mismo path en app y worker (reintento vault; sin esto la API no ve los archivos del worker).
      - gyb_work_gmail:/var/msa/work/gmail
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - proxy-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # --------------------------------------------------------------- worker
  # Celery worker (ejecuta backups, restores, provisioning, integrity)
  worker:
    image: ghcr.io/danytrax/backup-drivegws-app:${APP_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: msa-backup-worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      ROLE: worker
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO", "--concurrency=${CELERY_CONCURRENCY:-2}"]
    volumes:
      - ../backend/app:/app/app:rw
      - ../backend/migrations:/app/migrations:rw
      - ../backend/tests:/app/tests:rw
      - ../backend/scripts:/app/scripts:rw
      - ../backend/alembic.ini:/app/alembic.ini:ro
      - app_data:/data
      - rclone_config:/root/.config/rclone
      - secrets:/app/secrets:ro
      - maildirs:/var/mail/vhosts
      - platform_backups:/platform_backups
      - gyb_work_gmail:/var/msa/work/gmail
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ----------------------------------------------------------------- beat
  # Celery beat (scheduler)
  beat:
    image: ghcr.io/danytrax/backup-drivegws-app:${APP_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: msa-backup-beat
    restart: unless-stopped
    env_file: ../.env
    environment:
      ROLE: beat
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=INFO", "--schedule=/data/celerybeat-schedule"]
    volumes:
      - ../backend/app:/app/app:rw
      - ../backend/migrations:/app/migrations:rw
      - ../backend/tests:/app/tests:rw
      - ../backend/scripts:/app/scripts:rw
      - ../backend/alembic.ini:/app/alembic.ini:ro
      - app_data:/data
      - secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # -------------------------------------------------------------- postgres
  postgres:
    image: postgres:16-alpine
    container_name: msa-backup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in ../.env and use docker compose --env-file ../.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in ../.env and use --env-file ../.env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in ../.env and use --env-file ../.env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------- redis
  redis:
    image: redis:7-alpine
    container_name: msa-backup-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD in ../.env and use --env-file ../.env}
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:?Set REDIS_PASSWORD in ../.env and use --env-file ../.env}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------- dovecot
  # IMAP interno que sirve los Maildir generados desde backups GYB.
  # NO expone puertos al host (para no chocar con Mailcow), solo en red interna.
  dovecot:
    image: ghcr.io/danytrax/backup-drivegws-dovecot:${APP_TAG:-latest}
    build:
      context: ../mail/dovecot
      dockerfile: Dockerfile
    container_name: msa-backup-dovecot
    restart: unless-stopped
    # Mismo .env que app. NO forzar POSTGRES_HOST/PORT aquí: si lo hacéis, Dovecot y la app
    # (set_gw_imap_password / API) pueden apuntar a Postgres distintos y IMAP nunca acierta.
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in ../.env and use --env-file ../.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in ../.env and use --env-file ../.env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in ../.env and use --env-file ../.env}
      DOVECOT_MASTER_USER: ${DOVECOT_MASTER_USER:?Set DOVECOT_MASTER_USER in ../.env and use --env-file ../.env}
      DOVECOT_MASTER_PASSWORD: ${DOVECOT_MASTER_PASSWORD:?Set DOVECOT_MASTER_PASSWORD in ../.env and use --env-file ../.env}
      # 1 = genera 99-imap-auth-debug.conf (auth_debug). Apagar al terminar el diagnóstico.
      IMAP_DOVECOT_AUTH_DEBUG: ${IMAP_DOVECOT_AUTH_DEBUG:-0}
    volumes:
      # Solo Maildir. NO montar /etc/dovecot ni /srv/mail: tapa templates/ de la imagen y deja auth roto.
      - maildirs:/var/mail/vhosts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "doveadm", "who"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------- roundcube
  # Webmail. Expuesto solo al proxy-net (lo publica NPM).
  # Imagen propia: instala vendor/ del plugin msa_sso (JWT + Redis); el bind-mount anterior causaba HTTP 500.
  roundcube:
    image: ghcr.io/danytrax/backup-drivegws-roundcube:${APP_TAG:-latest}
    build:
      context: ../mail/roundcube
      dockerfile: Dockerfile
    container_name: msa-backup-roundcube
    restart: unless-stopped
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: ${ROUNDCUBE_DEFAULT_HOST:?Set ROUNDCUBE_DEFAULT_HOST in ../.env and use --env-file ../.env}
      ROUNDCUBEMAIL_DEFAULT_PORT: ${ROUNDCUBE_DEFAULT_PORT:?Set ROUNDCUBE_DEFAULT_PORT in ../.env and use --env-file ../.env}
      ROUNDCUBEMAIL_SMTP_SERVER: ""              # no enviar correo desde webmail
      ROUNDCUBEMAIL_DB_TYPE: pgsql
      # Nombre del contenedor (no el servicio "postgres"): en redes múltiples el host
      # "postgres" puede resolver a otro contenedor en proxy-net y la BD "roundcube"
      # parece inexistente aunque exista en msa-backup-postgres.
      ROUNDCUBEMAIL_DB_HOST: msa-backup-postgres
      ROUNDCUBEMAIL_DB_USER: ${POSTGRES_USER}
      ROUNDCUBEMAIL_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ROUNDCUBEMAIL_DB_NAME: roundcube
      ROUNDCUBEMAIL_SKIN: elastic
      ROUNDCUBEMAIL_PLUGINS: "archive,zipdownload,msa_sso"
      ROUNDCUBEMAIL_DES_KEY: ${ROUNDCUBE_DES_KEY:?Set ROUNDCUBE_DES_KEY in ../.env and use --env-file ../.env}
      REDIS_HOST: msa-backup-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in ../.env and use --env-file ../.env}
      MSA_SSO_SECRET: ${SECRET_KEY:?Set SECRET_KEY in ../.env and use --env-file ../.env}
      DOVECOT_MASTER_USER: ${DOVECOT_MASTER_USER:?Set DOVECOT_MASTER_USER in ../.env and use --env-file ../.env}
      DOVECOT_MASTER_PASSWORD: ${DOVECOT_MASTER_PASSWORD:?Set DOVECOT_MASTER_PASSWORD in ../.env and use --env-file ../.env}
    expose:
      - "80"
    volumes:
      # No montar /var/www/html: un volumen nombrado tapa la imagen y deja un tree
      # viejo (sin vendor del plugin, Roundcube desactualizado) → HTTP 500.
      - ../mail/roundcube/config:/var/roundcube/config:ro
    depends_on:
      - dovecot
      - postgres
    networks:
      - internal
      - proxy-net

# ============================================================ networks
networks:
  internal:
    driver: bridge
  proxy-net:
    external: true

# ============================================================== volumes
volumes:
  app_data:
  pg_data:
  redis_data:
  rclone_config:
  maildirs:
  secrets:
  platform_backups:
  gyb_work_gmail:
