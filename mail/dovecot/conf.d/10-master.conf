##
## Service definitions (IMAP + auth sockets)
## IMAP only listens on the internal docker network. No STARTTLS needed
## because the traffic never leaves the private bridge (Roundcube is same net).
##
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

service auth {
  unix_listener auth-userdb {
    mode = 0660
    user = dovecot
    group = dovecot
  }
}

service auth-worker {
  user = dovecot
}
